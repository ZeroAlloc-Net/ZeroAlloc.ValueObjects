name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore ZeroAlloc.ValueObjects.slnx

      - name: Build
        run: dotnet build ZeroAlloc.ValueObjects.slnx --configuration Release --no-restore -p:Version=${{ needs.release-please.outputs.version }}

      - name: Test
        run: dotnet test ZeroAlloc.ValueObjects.slnx --configuration Release --no-build

      - name: Pack ZeroAlloc.ValueObjects
        run: dotnet pack src/ZeroAlloc.ValueObjects/ZeroAlloc.ValueObjects.csproj --configuration Release --no-build -p:Version=${{ needs.release-please.outputs.version }} -o ./artifacts

      - name: Pack ZeroAlloc.ValueObjects.EfCore
        run: dotnet pack src/ZeroAlloc.ValueObjects.EfCore/ZeroAlloc.ValueObjects.EfCore.csproj --configuration Release --no-build -p:Version=${{ needs.release-please.outputs.version }} -o ./artifacts

      - name: Push to NuGet.org
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/ZeroAlloc-Net/index.json --skip-duplicate

      - name: Upload packages to GitHub Release
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ./artifacts/*.nupkg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
