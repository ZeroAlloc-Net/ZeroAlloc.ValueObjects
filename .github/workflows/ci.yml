name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Calculate version
        id: gitversion
        run: |
          version=$(dotnet dotnet-gitversion /output json /showvariable SemVer)
          echo "semver=$version" >> $GITHUB_OUTPUT
          echo "Calculated version: $version"

      - name: Restore
        run: dotnet restore ZeroAlloc.ValueObjects.slnx

      - name: Build
        run: dotnet build ZeroAlloc.ValueObjects.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ZeroAlloc.ValueObjects.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  aot-smoke:
    runs-on: ubuntu-latest
    # The repo's global.json pins the .NET 9 SDK, which has full Native AOT
    # support. This job publishes the sample with PublishAot=true and runs the
    # binary — it catches IL2026/IL3050 regressions in generator-emitted code
    # that the xUnit suite cannot.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install AOT native toolchain
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore samples/ZeroAlloc.ValueObjects.AotSmoke/ZeroAlloc.ValueObjects.AotSmoke.csproj

      - name: Publish AOT
        # No `-p:PublishAot=true` on the CLI — that propagates as a global MSBuild
        # property to every transitive ProjectReference and trips NETSDK1207 when
        # any referenced project (including the ns2.0 generator) is evaluated for
        # AOT compatibility. PublishAot is declared inside the sample csproj only.
        run: dotnet publish samples/ZeroAlloc.ValueObjects.AotSmoke/ZeroAlloc.ValueObjects.AotSmoke.csproj -r linux-x64 -c Release -o ./aot-out

      - name: Run AOT binary
        run: ./aot-out/ZeroAlloc.ValueObjects.AotSmoke

  api-compat:
    uses: ZeroAlloc-Net/.github/.github/workflows/api-compat.yml@main
    with:
      package-id: ZeroAlloc.ValueObjects
      csproj-path: src/ZeroAlloc.ValueObjects/ZeroAlloc.ValueObjects.csproj
